<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minco | Premium Navigation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>

    <div id="main-ui" class="container">
        <h1 class="logo">Minco</h1>
        
        <div class="search-wrapper">
            <form id="proxy-form">
                <input type="text" id="url-input" placeholder="Search the web or enter URL..." autocomplete="off">
                <button type="submit" id="go-btn">Explore</button>
            </form>
        </div>

        <div class="shortcut-container">
            <div class="shortcut" onclick="launchSite('https://monochrome.tf')">Music</div>
            <div class="shortcut" onclick="launchSite('https://vexo.tv')">Movies</div>
            <div class="shortcut" onclick="launchSite('https://youtube.com')">YouTube</div>
            <div class="shortcut" onclick="launchSite('https://reddit.com')">Reddit</div>
        </div>
    </div>

    <div class="dock">
        <div class="dock-item" onclick="toggleModal('settings-modal')">Settings</div>
        <div class="dock-item" onclick="alert('Minco Premium: To be existing (not out yet)')">Premium</div>
        <div class="dock-item" onclick="launchSite('https://freezenova.ai')">Chat</div>
        <div class="dock-item" onclick="toggleModal('account-modal')">Account</div>
    </div>

    <div id="account-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="toggleModal('account-modal')">&times;</span>
            <div id="login-form">
                <h2>Sign In</h2>
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <button class="btn-main">Login</button>
                <p>No account? <span class="link" onclick="switchAccountView('signup')">Sign Up</span></p>
            </div>
            <div id="signup-form" class="hidden">
                <h2>Create Account</h2>
                <input type="text" placeholder="Username">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button class="btn-main">Register</button>
                <p>Already have one? <span class="link" onclick="switchAccountView('login')">Login</span></p>
            </div>
        </div>
    </div>

    <div id="iframe-wrapper" class="hidden">
        <div class="frame-bar">
            <span id="frame-url-display"></span>
            <button id="exit-btn">Exit</button>
        </div>
        <iframe id="proxy-frame" src=""></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
